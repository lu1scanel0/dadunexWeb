<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Página no encontrada | Agrícola Dadunex</title>
    <meta name="description" content="La página que buscas no está disponible. Regresa al inicio de Agrícola Dadunex.">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#198754">

    <link rel="icon" href="/images/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>
        :root {
            --dadunex-green: #198754;
            --dadunex-green-dark: #146c43;
            --dadunex-orange: #f57c00;
            --dadunex-bg: #f7f8f5;
            --dadunex-text: #2f3a33;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(25, 135, 84, 0.10), transparent 32%),
                radial-gradient(circle at bottom right, rgba(245, 124, 0, 0.10), transparent 30%),
                var(--dadunex-bg);
            color: var(--dadunex-text);
            font-family: Arial, Helvetica, sans-serif;
        }

        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            padding: 1rem 0;
            background: var(--dadunex-green);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.10);
        }

        .topbar img {
            width: 190px;
            height: auto;
        }

        .error-content {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 3rem 1rem;
        }

        .error-card {
            width: 100%;
            max-width: 760px;
            margin: 0 auto;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(25, 135, 84, 0.12);
            border-radius: 24px;
            box-shadow: 0 18px 50px rgba(31, 55, 41, 0.12);
            text-align: center;
        }

        .brand-icon {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 1.25rem;
        }

        .error-code {
            margin: 0;
            color: var(--dadunex-orange);
            font-size: clamp(4rem, 12vw, 7.5rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.05em;
        }

        h1 {
            margin: 0.75rem 0 1rem;
            color: var(--dadunex-green-dark);
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 700;
        }

        .error-text {
            max-width: 570px;
            margin: 0 auto 2rem;
            color: #5e6c63;
            font-size: 1.08rem;
            line-height: 1.7;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.85rem;
        }

        .btn-dadunex {
            min-width: 180px;
            padding: 0.85rem 1.4rem;
            border-radius: 999px;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-dadunex:hover,
        .btn-dadunex:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(25, 135, 84, 0.18);
        }

        .btn-primary-dadunex {
            border: 1px solid var(--dadunex-green);
            background: var(--dadunex-green);
            color: #fff;
        }

        .btn-primary-dadunex:hover,
        .btn-primary-dadunex:focus {
            border-color: var(--dadunex-green-dark);
            background: var(--dadunex-green-dark);
            color: #fff;
        }

        .btn-outline-dadunex {
            border: 1px solid var(--dadunex-green);
            background: transparent;
            color: var(--dadunex-green-dark);
        }

        .btn-outline-dadunex:hover,
        .btn-outline-dadunex:focus {
            background: rgba(25, 135, 84, 0.08);
            color: var(--dadunex-green-dark);
        }

        footer {
            padding: 1rem;
            color: #68736c;
            text-align: center;
            font-size: 0.92rem;
        }

        @media (max-width: 576px) {
            .topbar img {
                width: 155px;
            }

            .error-content {
                padding: 1.5rem 1rem;
            }

            .error-card {
                padding: 2rem 1.25rem;
                border-radius: 18px;
            }

            .brand-icon {
                width: 90px;
                height: 90px;
            }

            .actions {
                flex-direction: column;
            }

            .btn-dadunex {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="error-page">
        <header class="topbar">
            <div class="container text-center">
                <a href="/" aria-label="Volver al inicio de Agrícola Dadunex">
                    <img
                        src="/images/logos/logo_dadunex_bco.webp"
                        alt="Agrícola Dadunex"
                        width="250"
                        height="100">
                </a>
            </div>
        </header>

        <main class="error-content">
            <section class="error-card" aria-labelledby="error-title">
                <img
                    class="brand-icon"
                    src="/images/logos/dadunex_ico.png"
                    alt=""
                    width="120"
                    height="120"
                    aria-hidden="true">

                <p class="error-code" aria-label="Error 404">404</p>

                <h1 id="error-title">Página no encontrada</h1>

                <p class="error-text">
                    La dirección que ingresaste no existe, fue movida o ya no está disponible.
                    Puedes volver al inicio o ir directamente a la sección de contacto.
                </p>

                <div class="actions">
                    <a class="btn btn-dadunex btn-primary-dadunex" href="/">
                        Volver al inicio
                    </a>

                    <a class="btn btn-dadunex btn-outline-dadunex" href="/#contact">
                        Ir a contacto
                    </a>
                </div>
            </section>
        </main>

        <footer>
            &copy; 2026 Agrícola Dadunex · Buin, Santiago de Chile
        </footer>
    </div>
</body>
</html>
